name: Build & Publish

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build wheels (${{ matrix.platform_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # linux-64
          - os: ubuntu-latest
            python: 313
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: 313
            platform_id: musllinux_x86_64
          # linux-aarch64
          - os: ubuntu-24.04-arm
            python: 313
            platform_id: manylinux_aarch64
          - os: ubuntu-24.04-arm
            python: 313
            platform_id: musllinux_aarch64
          # macos-x86_64
          - os: macos-15-intel
            python: 313
            platform_id: macosx_x86_64
          # macos-arm64
          - os: macos-15
            python: 313
            platform_id: macosx_arm64
          # windows-amd64
          - os: windows-latest
            python: 313
            platform_id: win_amd64
          # windows-arm64
          - os: windows-11-arm
            python: 313
            platform_id: win_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD: cp${{ matrix.python }}-${{ matrix.platform_id }}
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "cp {wheel} {dest_dir}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "cp {wheel} {dest_dir}"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform_id }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
